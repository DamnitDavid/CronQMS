{# Per-type custom-field filter controls. Swapped in by htmx when the filter
   bar's Event Type changes. Each control is named cf_<id> so it submits with
   the filter form. #}
{% for field in filter_fields %}
<label>
    {{ field.label }}
    {% if field.field_type == "select" %}
    <select name="cf_{{ field.id }}">
        <option value="">All</option>
        {% for opt in field.options.split("\n") if opt.strip() %}
        <option value="{{ opt.strip() }}" {% if filter_values.get('cf_' ~ field.id) == opt.strip() %}selected{% endif %}>{{ opt.strip() }}</option>
        {% endfor %}
    </select>
    {% elif field.field_type == "boolean" %}
    <select name="cf_{{ field.id }}">
        <option value="">All</option>
        <option value="true" {% if filter_values.get('cf_' ~ field.id) == 'true' %}selected{% endif %}>Yes</option>
        <option value="false" {% if filter_values.get('cf_' ~ field.id) == 'false' %}selected{% endif %}>No</option>
    </select>
    {% elif field.field_type == "date" %}
    <input type="date" name="cf_{{ field.id }}" value="{{ filter_values.get('cf_' ~ field.id, '') }}">
    {% else %}
    <input type="search" name="cf_{{ field.id }}" placeholder="Contains…" value="{{ filter_values.get('cf_' ~ field.id, '') }}">
    {% endif %}
</label>
{% endfor %}
