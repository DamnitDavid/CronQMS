{% extends "base_admin.html" %}

{% block title %}Audits{% endblock %}
{% set active_nav = "audits" %}

{% block admin_content %}
{% if perms.can_create %}
<section class="page-actions">
    <a class="button-primary" href="/admin/audits/create">New Audit</a>
</section>
{% endif %}

<section class="filter-bar">
    <form class="filter-form"
          hx-get="/admin/audits"
          hx-target="#auditTable"
          hx-swap="outerHTML"
          hx-include="this">
        <label>
            Type
            <select name="audit_type">
                <option value="">All</option>
                {% for t in types %}
                <option value="{{ t }}" {% if filters.audit_type == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            Status
            <select name="status">
                <option value="">All</option>
                {% for s in statuses %}
                <option value="{{ s }}" {% if filters.status == s %}selected{% endif %}>{{ s.replace('_', ' ') }}</option>
                {% endfor %}
            </select>
        </label>
        <button type="submit">Filter</button>
        <a class="button-secondary" href="/admin/audits">Reset</a>
    </form>
</section>

{% include "admin/audits/_audit_table.html" %}
{% endblock %}
