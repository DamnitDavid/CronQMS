{% extends "base_admin.html" %}

{% block title %}Edit Course{% endblock %}
{% set active_nav = "training" %}

{% block admin_content %}
{% if error %}<div class="banner-error">{{ error }}</div>{% endif %}

<form class="card" method="post" action="/admin/training/courses/{{ course.id }}/edit" style="max-width: 820px;">
    <div class="form-grid">
        <div class="form-group">
            <label for="code">Code</label>
            <input type="text" id="code" name="code" value="{{ course.code }}" required>
        </div>
        <div class="form-group">
            <label for="recertification_period_months">Recertification Period (months)</label>
            <input type="number" id="recertification_period_months" name="recertification_period_months" min="1" max="600" value="{{ course.recertification_period_months or '' }}" placeholder="Leave blank for no expiry">
        </div>
    </div>
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ course.title }}" required minlength="3">
    </div>
    <div class="form-group">
        <label for="document_id">Linked SOP / Document</label>
        <select id="document_id" name="document_id">
            <option value="">None</option>
            {% for d in documents %}
            <option value="{{ d.id }}" {% if course.document_id == d.id %}selected{% endif %}>{{ d.document_number }} — {{ d.title }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description">{{ course.description or '' }}</textarea>
    </div>
    <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Save Changes</button>
        <a class="button-secondary" href="/admin/training/courses/{{ course.id }}">Cancel</a>
    </div>
</form>
{% endblock %}
