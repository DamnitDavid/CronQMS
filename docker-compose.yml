# DEVELOPMENT ONLY. This compose file is for local development and must not be
# used in production: it runs uvicorn with --reload, bind-mounts the source into
# the container, ships weak default DB credentials, exposes Postgres on 5432, and
# defaults to DEBUG=true / ENVIRONMENT=development (which leaves session cookies
# without the Secure flag). For production, deploy the container to a PaaS using
# render.yaml (see README "Deploy to a PaaS").
services:
  postgres:
    image: postgres:16-alpine
    container_name: cronqms-db
    environment:
      POSTGRES_USER: cronqms_user
      POSTGRES_PASSWORD: cronqms_password
      POSTGRES_DB: cronqms_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cronqms_user -d cronqms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cronqms-network

  app:
    build: .
    container_name: cronqms-app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cronqms_user:cronqms_password@postgres:5432/cronqms_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cronqms-network

volumes:
  postgres_data:
    driver: local

networks:
  cronqms-network:
    driver: bridge
