{# Sub-navigation for the Settings area. Pass `settings_tab` = "fields" | "groups" | "roles" | "config". #}
<nav class="settings-tabs">
    <a href="/admin/settings/custom-fields"
       class="{{ 'active' if settings_tab | default('') == 'fields' }}">Custom Fields</a>
    <a href="/admin/settings/groups"
       class="{{ 'active' if settings_tab | default('') == 'groups' }}">Assignee Groups</a>
    <a href="/admin/settings/roles"
       class="{{ 'active' if settings_tab | default('') == 'roles' }}">Roles</a>
    <a href="/admin/settings/config"
       class="{{ 'active' if settings_tab | default('') == 'config' }}">Config</a>
</nav>
