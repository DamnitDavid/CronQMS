{% extends "base_admin.html" %}

{% block title %}Events{% endblock %}
{% set active_nav = "events" %}

{% block admin_content %}
{% if can_create %}
<section class="page-actions">
    <a class="button-primary" href="/admin/events/create">New Event</a>
</section>
{% endif %}

<section class="filter-bar">
    <form class="filter-form"
          hx-get="/admin/events"
          hx-target="#eventTable"
          hx-swap="outerHTML"
          hx-include="this">
        <label>
            Search
            <input type="search" name="search" placeholder="Search events..." value="{{ filters.search }}">
        </label>
        <label>
            Status
            <select name="status">
                <option value="">All</option>
                {% for s in ["Open", "In_Progress", "Resolved", "Closed"] %}
                <option value="{{ s }}" {% if filters.status == s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            Priority
            <select name="priority">
                <option value="">All</option>
                {% for p in ["Low", "Medium", "High", "Critical"] %}
                <option value="{{ p }}" {% if filters.priority == p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            Event Type
            <select name="event_type"
                    hx-get="/admin/events/filter-fields"
                    hx-target="#filter-custom"
                    hx-swap="innerHTML"
                    hx-trigger="change"
                    hx-include="this">
                <option value="">All</option>
                {% for t in event_types %}
                <option value="{{ t }}" {% if filters.event_type == t %}selected{% endif %}>{{ event_type_label(t) }}</option>
                {% endfor %}
            </select>
        </label>

        <span id="filter-custom" class="filter-custom">
            {% include "admin/events/_filter_fields.html" %}
        </span>

        <button type="submit">Filter</button>
        <a class="button-secondary" href="/admin/events">Reset</a>
    </form>
</section>

{% include "admin/events/_event_table.html" %}
{% endblock %}
