{% extends "base_admin.html" %}

{% block title %}Edit {{ audit.reference }}{% endblock %}
{% set active_nav = "audits" %}

{% block admin_content %}
{% if error %}<div class="banner-error">{{ error }}</div>{% endif %}

<form class="card" method="post" action="/admin/audits/{{ audit.id }}/edit" style="max-width: 820px;">
    <div class="form-grid">
        <div class="form-group">
            <label for="reference">Reference</label>
            <input type="text" id="reference" name="reference" required value="{{ audit.reference }}">
        </div>
        <div class="form-group">
            <label for="audit_type">Type</label>
            <select id="audit_type" name="audit_type">
                {% for t in types %}
                <option value="{{ t }}" {% if audit.audit_type == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required minlength="3" value="{{ audit.title }}">
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="standard">Standard / Reference</label>
            <input type="text" id="standard" name="standard" value="{{ audit.standard or '' }}">
        </div>
        <div class="form-group">
            <label for="auditee">Auditee (area / supplier)</label>
            <input type="text" id="auditee" name="auditee" value="{{ audit.auditee or '' }}">
        </div>
    </div>

    <div class="form-group">
        <label for="lead_auditor_id">Lead Auditor</label>
        <select id="lead_auditor_id" name="lead_auditor_id">
            <option value="">Unassigned</option>
            {% for u in users %}
            <option value="{{ u.id }}" {% if audit.lead_auditor_id == u.id %}selected{% endif %}>{{ u.email }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="scope">Scope</label>
        <textarea id="scope" name="scope">{{ audit.scope or '' }}</textarea>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="planned_date">Planned Date</label>
            <input type="date" id="planned_date" name="planned_date" value="{{ audit.planned_date or '' }}">
        </div>
        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date" value="{{ audit.start_date or '' }}">
        </div>
        <div class="form-group">
            <label for="end_date">End Date</label>
            <input type="date" id="end_date" name="end_date" value="{{ audit.end_date or '' }}">
        </div>
    </div>

    <div class="form-group">
        <label for="summary">Summary / Conclusion</label>
        <textarea id="summary" name="summary">{{ audit.summary or '' }}</textarea>
    </div>

    <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Save Changes</button>
        <a class="button-secondary" href="/admin/audits/{{ audit.id }}">Cancel</a>
    </div>
</form>
{% endblock %}
