{% extends "base_admin.html" %}

{% block title %}New Change Request{% endblock %}
{% set active_nav = "changes" %}

{% block admin_content %}
{% if error %}<div class="banner-error">{{ error }}</div>{% endif %}

<form class="card" method="post" action="/admin/changes/create" style="max-width: 820px;">
    <div class="form-grid">
        <div class="form-group">
            <label for="reference">Reference</label>
            <input type="text" id="reference" name="reference" required placeholder="e.g. CC-2026-001">
        </div>
        <div class="form-group">
            <label for="change_type">Type</label>
            <select id="change_type" name="change_type">
                {% for t in types %}
                <option value="{{ t }}">{{ t }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required minlength="3">
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="risk_level">Risk Level</label>
            <select id="risk_level" name="risk_level">
                {% for r in risks %}
                <option value="{{ r }}">{{ r }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="affected_area">Affected Area (line / product / dept)</label>
            <input type="text" id="affected_area" name="affected_area">
        </div>
    </div>

    <div class="form-group">
        <label for="owner_id">Change Owner</label>
        <select id="owner_id" name="owner_id">
            <option value="">Unassigned</option>
            {% for u in users %}
            <option value="{{ u.id }}">{{ u.email }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="description">Description (what is changing)</label>
        <textarea id="description" name="description"></textarea>
    </div>

    <div class="form-group">
        <label for="reason">Reason / Justification</label>
        <textarea id="reason" name="reason"></textarea>
    </div>

    <div class="form-group">
        <label for="target_date">Target Implementation Date</label>
        <input type="date" id="target_date" name="target_date">
    </div>

    <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Create Change Request</button>
        <a class="button-secondary" href="/admin/changes">Cancel</a>
    </div>
</form>
{% endblock %}
