{% extends "base.html" %}

{% block title %}Create Event - Proins Admin{% endblock %}

{% block content %}
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="brand">Proins</div>
        <nav>
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/events" class="active">Events</a>
            <a href="#">Users</a>
            <a href="#">Reports</a>
        </nav>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <h1>Create Event</h1>
            </div>
        </header>

        <section class="container">
            <form id="createEventForm" method="post" action="/api/events/">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description"></textarea>
                </div>
                <div class="form-group">
                    <label for="event_type">Event Type</label>
                    <select id="event_type" name="event_type">
                        <option>Non_Conformance</option>
                        <option>CAPA</option>
                        <option>Audit_Finding</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority">
                        <option>Medium</option>
                        <option>Low</option>
                        <option>High</option>
                        <option>Critical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="facility">Facility</label>
                    <input type="text" id="facility" name="facility">
                </div>
                <button class="button-primary" type="submit">Create Event</button>
            </form>
        </section>
    </div>
</div>
{% endblock %}
