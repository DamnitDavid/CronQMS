{% extends "base_admin.html" %}

{% block title %}Create Defect{% endblock %}
{% set active_nav = "defects" %}

{% block admin_content %}
{% if error %}<div class="banner-error">{{ error }}</div>{% endif %}

<form id="createEventForm" class="card" method="post" action="/admin/defects/create" style="max-width: 820px;">
    <div class="form-group">
        <label for="event_type">Defect Type</label>
        <select id="event_type" name="event_type">
            {% for t in event_types %}
            <option value="{{ t }}" {% if t == selected_type %}selected{% endif %}>{{ event_type_label(t) }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required minlength="3">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description"></textarea>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                <option>Medium</option>
                <option>Low</option>
                <option>High</option>
                <option>Critical</option>
            </select>
        </div>
        <div class="form-group">
            <label for="assignee">Assignee</label>
            <select id="assignee" name="assignee">
                <option value="">Unassigned</option>
                {% if users %}
                <optgroup label="Users">
                    {% for u in users %}
                    <option value="user:{{ u.id }}">{{ u.email }}</option>
                    {% endfor %}
                </optgroup>
                {% endif %}
                {% if groups %}
                <optgroup label="Groups">
                    {% for g in groups %}
                    <option value="group:{{ g.id }}">{{ g.name }}</option>
                    {% endfor %}
                </optgroup>
                {% endif %}
            </select>
        </div>
        <div class="form-group">
            <label for="site_id">Site</label>
            <select id="site_id" name="site_id">
                <option value="">None</option>
                {% for s in sites %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="target_close_date">Target Close Date</label>
            <input type="date" id="target_close_date" name="target_close_date">
            <small>Defaults to 30 days from today if left blank.</small>
        </div>
        <div class="form-group">
            <label for="lot_batch">Lot / Batch</label>
            <input type="text" id="lot_batch" name="lot_batch">
        </div>
    </div>

    <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Create Defect</button>
        <a class="button-secondary" href="/admin/defects">Cancel</a>
    </div>
</form>
{% endblock %}
