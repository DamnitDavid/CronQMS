{% extends "base_admin.html" %}

{% block title %}Edit {{ document.document_number }}{% endblock %}
{% set active_nav = "documents" %}

{% block admin_content %}
{% if error %}<div class="banner-error">{{ error }}</div>{% endif %}

<form class="card" method="post" action="/admin/documents/{{ document.id }}/edit" style="max-width: 820px;">
    <div class="form-grid">
        <div class="form-group">
            <label for="document_number">Document Number</label>
            <input type="text" id="document_number" name="document_number" required value="{{ document.document_number }}">
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                {% for c in categories %}
                <option value="{{ c }}" {% if document.category == c %}selected{% endif %}>{{ c.replace('_', ' ') }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required minlength="3" value="{{ document.title }}">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description">{{ document.description or "" }}</textarea>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="owner_id">Owner</label>
            <select id="owner_id" name="owner_id">
                <option value="">Unassigned</option>
                {% for u in users %}
                <option value="{{ u.id }}" {% if document.owner_id == u.id %}selected{% endif %}>{{ u.email }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="review_period_months">Review Period (months)</label>
            <input type="number" id="review_period_months" name="review_period_months" min="1" max="120" value="{{ document.review_period_months or '' }}">
        </div>
        <div class="form-group">
            <label for="retention_period_months">Retention Period (months)</label>
            <input type="number" id="retention_period_months" name="retention_period_months" min="1" max="1200" value="{{ document.retention_period_months or '' }}">
        </div>
    </div>

    <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Save Changes</button>
        <a class="button-secondary" href="/admin/documents/{{ document.id }}">Cancel</a>
    </div>
</form>
{% endblock %}
