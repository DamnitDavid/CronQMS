services:
  postgres:
    image: postgres:16-alpine
    container_name: proins-db
    environment:
      POSTGRES_USER: proins_user
      POSTGRES_PASSWORD: proins_password
      POSTGRES_DB: proins_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proins_user -d proins_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proins-network

  app:
    build: .
    container_name: proins-app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://proins_user:proins_password@postgres:5432/proins_db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proins-network

volumes:
  postgres_data:
    driver: local

networks:
  proins-network:
    driver: bridge
