<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CronQMS - Quality Event Management{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231d4ed8'/><text x='50' y='70' font-size='62' font-family='Segoe UI,Arial' font-weight='bold' fill='white' text-anchor='middle'>C</text></svg>">
    <script src="/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <script>
        // Apply the saved theme before first paint to avoid a flash of the
        // wrong theme. Mirrors the toggle logic in admin.js.
        (function () {
            try {
                if (localStorage.getItem("cronqms-theme") === "dark") {
                    document.documentElement.setAttribute("data-theme", "dark");
                    document.documentElement.classList.add("dark-mode");
                }
            } catch (e) { /* localStorage unavailable */ }
        })();
    </script>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/admin.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
