{% extends "base.html" %}

{% block title %}Sign in - Proins{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-mark">P</span> Proins
        </div>
        <p class="auth-sub">Sign in to your Quality Event Management workspace.</p>

        <form hx-post="/api/auth/browser-login" hx-target="#response">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="button-primary">Sign in</button>
        </form>

        <div id="response" class="mt-1"></div>

        <div class="auth-alt">
            <p>Don't have an account? <a href="/register">Sign up here</a></p>
            <p><a href="/setup">First time here? Set up your admin account</a></p>
        </div>
    </div>
</div>
{% endblock %}
