{% extends "base_admin.html" %}

{% block title %}New CAPA{% endblock %}
{% set active_nav = "capa" %}

{% block admin_content %}
{% if error %}<div class="banner-error">{{ error }}</div>{% endif %}

<form class="card" method="post" action="/admin/capa/create" style="max-width: 820px;">
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required minlength="3">
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="owner_id">Owner</label>
            <select id="owner_id" name="owner_id">
                <option value="">Unassigned</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.email }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" name="due_date">
        </div>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="root_cause_category">Root Cause Category</label>
            <input type="text" id="root_cause_category" name="root_cause_category" placeholder="e.g. Material, Method, Machine">
        </div>
        <div class="form-group">
            <label for="rca_method">RCA Method</label>
            <input type="text" id="rca_method" name="rca_method" placeholder="e.g. 5-Why, Fishbone">
        </div>
    </div>

    <div class="form-group">
        <label for="containment_actions">Containment Actions</label>
        <textarea id="containment_actions" name="containment_actions"></textarea>
    </div>

    <div class="form-group">
        <label for="root_cause">Root Cause</label>
        <textarea id="root_cause" name="root_cause"></textarea>
    </div>

    <div class="form-group">
        <label for="corrective_action">Corrective Action</label>
        <textarea id="corrective_action" name="corrective_action"></textarea>
    </div>

    <div class="form-group">
        <label for="preventive_action">Preventive Action</label>
        <textarea id="preventive_action" name="preventive_action"></textarea>
    </div>

    <div style="margin-top: 1.25rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Create CAPA</button>
        <a class="button-secondary" href="/admin/capa">Cancel</a>
    </div>
</form>
{% endblock %}
