{% extends "base_admin.html" %}

{% block title %}Edit Event #{{ event.id }}{% endblock %}
{% set active_nav = "events" %}

{% block admin_content %}
<form class="card" method="post" action="/admin/events/{{ event.id }}/edit" style="max-width: 900px;">
    <div class="form-group">
        <label for="event_type">Event Type</label>
        <select id="event_type" name="event_type"
                hx-get="/admin/events/custom-fields"
                hx-target="#custom-fields"
                hx-swap="innerHTML"
                hx-trigger="change"
                hx-include="this"
                hx-vals='{"event_id": "{{ event.id }}"}'>
            {% for t in event_types %}
            <option value="{{ t }}" {% if event.event_type == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
        <small>The form adapts to the selected type.</small>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input id="title" name="title" value="{{ event.title }}" required minlength="3">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4">{{ event.description or "" }}</textarea>
    </div>

    <!-- Type-specific company fields, inline in the form -->
    <div id="custom-fields">
        {% include "admin/events/_custom_fields.html" %}
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                {% for p in ["Low", "Medium", "High", "Critical"] %}
                <option value="{{ p }}" {% if event.priority == p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="assignee">Assignee</label>
            <select id="assignee" name="assignee">
                <option value="">Unassigned</option>
                {% if users %}
                <optgroup label="Users">
                    {% for u in users %}
                    <option value="user:{{ u.id }}" {% if event.assigned_to == u.id %}selected{% endif %}>{{ u.email }}</option>
                    {% endfor %}
                </optgroup>
                {% endif %}
                {% if groups %}
                <optgroup label="Groups">
                    {% for g in groups %}
                    <option value="group:{{ g.id }}" {% if event.assigned_group_id == g.id %}selected{% endif %}>{{ g.name }}</option>
                    {% endfor %}
                </optgroup>
                {% endif %}
            </select>
        </div>
        <div class="form-group">
            <label for="site_id">Site</label>
            <select id="site_id" name="site_id">
                <option value="">None</option>
                {% for s in sites %}
                <option value="{{ s.id }}" {% if event.site_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="target_close_date">Target Close Date</label>
            <input id="target_close_date" name="target_close_date" type="date"
                   value="{{ event.target_close_date.isoformat() if event.target_close_date else '' }}">
        </div>
    </div>

    <h3 style="margin-top: 1.5rem;">Traceability</h3>
    <div class="form-grid">
        <div class="form-group"><label>Part Number</label><input name="product_part_number" value="{{ event.product_part_number or '' }}"></div>
        <div class="form-group"><label>Lot / Batch</label><input name="lot_batch" value="{{ event.lot_batch or '' }}"></div>
        <div class="form-group"><label>Supplier</label><input name="supplier" value="{{ event.supplier or '' }}"></div>
        <div class="form-group"><label>Work Order</label><input name="work_order" value="{{ event.work_order or '' }}"></div>
        <div class="form-group"><label>Machine</label><input name="machine" value="{{ event.machine or '' }}"></div>
    </div>

    <div style="margin-top: 1.5rem; display: flex; gap: 0.75rem;">
        <button class="button-primary" type="submit">Save Changes</button>
        <a class="button-secondary" href="/admin/events/{{ event.id }}">Cancel</a>
    </div>
</form>
{% endblock %}
