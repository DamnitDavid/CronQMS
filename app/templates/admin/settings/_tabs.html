{# Sub-navigation for the Settings area. Pass `settings_tab` = "groups" | "roles" | "navigation" | "config". #}
<nav class="settings-tabs">
    <a href="/admin/settings/groups"
       class="{{ 'active' if settings_tab | default('') == 'groups' }}">Groups</a>
    <a href="/admin/settings/roles"
       class="{{ 'active' if settings_tab | default('') == 'roles' }}">Roles</a>
    <a href="/admin/settings/navigation"
       class="{{ 'active' if settings_tab | default('') == 'navigation' }}">Navigation</a>
    <a href="/admin/settings/config"
       class="{{ 'active' if settings_tab | default('') == 'config' }}">Config</a>
</nav>
